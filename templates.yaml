    - name: "Roomba Charging"
      unique_id: roomba_charging
      state: >
        {% if state_attr('vacuum.roomba_760', 'charging') == true %}
          Charging
        {% else %}
          Not charging
        {% endif %}
      icon: mdi:battery-charging
 
